{% extends 'base.html' %}
{% block title %}Confirmar Exclusão — Admin EPIC{% endblock %}

{% block content %}
<div class="admin-section">
    <div class="confirm-delete-card">
        <div class="confirm-delete-icon">⚠️</div>
        <h2 class="confirm-delete-title">Confirmar Exclusão</h2>
        <p class="confirm-delete-msg">
            Você está prestes a excluir o {{ object_type }}:<br>
            <strong>{{ object }}</strong>
        </p>
        <p class="confirm-delete-warning">Esta ação <strong>não pode ser desfeita</strong>.</p>

        <form method="post" class="confirm-delete-actions">
            {% csrf_token %}
            <a href="{{ cancel_url }}" class="btn btn-ghost">Cancelar</a>
            <button type="submit" class="btn btn-danger">Sim, excluir</button>
        </form>
    </div>
</div>
{% endblock %}
